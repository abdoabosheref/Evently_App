flutter_native_splash:
  #! FOR ALL PLATFORM, except Android 12+:
  color: "#F4F7FF"  ##====================================[REQUIRED]==========
  color_dark: "#000F30"
  image:                assets/splash_logos/center_logo_light.png
  image_dark:          assets/splash_logos/center_logo_dark.png

  # general branding for all platform (except android 12+):
  # allows you to specify an image used as branding in the splash screen. should be png.
  branding: assets/splash_logos/branding_light.png
  branding_dark: assets/splash_logos/branding_dark.png
  fullscreen: true

  #! ANDROID 12+ configuration:
  android_12:
    # background color
    color: "#F4F7FF"
    color_dark: "#000F30"
    image: assets/splash_logos/center_logo_light.png
    image_dark: assets/splash_logos/center_logo_dark.png
    branding:      assets/splash_logos/branding_light.png
    branding_dark: assets/splash_logos/branding_dark.png
